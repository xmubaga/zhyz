name: Deploy to CloudBase

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Install CloudBase CLI
        run: npm install -g @cloudbase/cli

      - name: Deploy to CloudBase
        env:
          TENCENT_SECRET_ID: ${{ secrets.CLOUDBASE_SECRET_ID }}
          TENCENT_SECRET_KEY: ${{ secrets.CLOUDBASE_SECRET_KEY }}
        run: |
          tcb hosting deploy dist -e ${{ secrets.CLOUDBASE_ENV_ID }}
